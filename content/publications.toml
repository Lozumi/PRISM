[[publication]]
id = "shao2026finetec"
selected = true
title = "FineTec: Fine-Grained Action Recognition under Temporal Corruption via Skeleton Decomposition and Sequence Completion"
preview = "/publications/poster_2.jpg"
aspectRatio = "3/4"
authors = ["Dian Shao*", "Mingfei Shi", "Like Liu$"]
year = 2026
pubType = "Conference"
conference = "Proceedings of the 40th AAAI Conference on Artificial Intelligence (AAAI 2026)"
publisher = "AAAI Press"
url = "https://smartdianlab.github.io/projects-FineTec/"
code = "https://github.com/SmartDianLab/FineTec"
dataset = "https://huggingface.co/datasets/Lozumi/Gym288-skeleton"
doi = "10.1609/aaai.v40i11.37838"
abstract = "Recognizing fine-grained actions from temporally corrupted skeleton sequences remains a significant challenge, particularly in real-world scenarios where online pose estimation often yields substantial missing data. Existing methods often struggle to accurately recover temporal dynamics and fine-grained spatial structures, resulting in the loss of subtle motion cues crucial for distinguishing similar actions. To address this, we propose FineTec, a unified framework for Fine-grained action recognition under Te mporal C orruption. FineTec first restores a base skeleton sequence from corrupted input using context-aware completion with diverse temporal masking. Next, a skeleton-based spatial decomposition module partitions the skeleton into five semantic regions, further divides them into dynamic and static subgroups based on motion variance, and generates two augmented skeleton sequences via targeted perturbation. These, along with the base sequence, are then processed by a physics-driven estimation module, which utilizes Lagrangian dynamics to estimate joint accelerations. Finally, both the fused skeleton position sequence and the fused acceleration sequence are jointly fed into a GCN-based action recognition head. Extensive experiments on both coarse-grained (NTU-60, NTU-120) and fine-grained (Gym99, Gym288) benchmarks show that FineTec significantly outperforms previous methods under various levels of temporal corruption. Specifically, FineTec achieves top-1 accuracies of 89.1% and 78.1% on the challenging Gym99-severe and Gym288-severe settings, respectively, demonstrating its robustness and generalizability."
description = "A unified framework for fine-grained action recognition under temporal corruption using context-aware sequence completion, skeleton-based spatial decomposition and physics-driven acceleration modeling. Also a new dataset Gym288-skeleton extended from FineGym, for more fine-grained evaluation."
keywords = ["Action Recognition", "Fine-grained Analysis", "Skeleton-based Recognition", "Computer Vision"]
researcharea = "Action Recognition"

[[publication]]
id = "shao2025vlnuav"
selected = true
title = "Vision-and-Language Navigation for Unmanned Systems: Progress and Perspectives"
preview = "/publications/poster_1.jpg"
aspectRatio = "3/4"
authors = ["Dian Shao*", "Like Liu$", "Zhengzheng Xu", "Junqiang Bai"]
year = 2026
pubType = "Conference"
conference = "Proceedings of the 5th International Conference on Autonomous Unmanned Systems (ICAUS 2025)"
note = "EI indexed"
abstract = "Vision-and-Language Navigation has emerged as a key capability for next-generation unmanned systems, enabling embodied agents to interpret natural language instructions and autonomously operate in complex, real-world environments. This paper systematically reviews the evolution of VLN, from early indoor, graph-based settings to recent advances in outdoor and aerial scenarios. We highlight the pivotal role of foundation models, including large-scale vision–language models (VLMs) and large language models (LLMs), in enhancing open-vocabulary perception, compositional reasoning, and generalization, thereby enabling robust zero-shot navigation and collaborative multi-agent systems. The review covers major benchmarks, representative methodologies, and state-of-the-art systems, with a particular focus on the challenges and opportunities arising from dynamic urban and aerial environments. Finally, we discuss recent key innovations and persistent challenges in the field, and outline future directions for the development of intelligent, language-guided autonomous agents."
description = "Survey paper on VLN for unmanned systems, covering progress and future directions."
keywords = ["Vision-Language Navigation", "UAV", "Unmanned Systems", "Survey"]
researcharea = "Vision-Language Navigation"

[[publication]]
id = "shao2025finecog"
selected = true
title = "FineCog-Nav: Integrating Fine-grained Cognitive Modules for Zero-shot Multimodal UAV Navigation"
preview = "/publications/poster_3.jpg"
aspectRatio = "3/4"
authors = ["Dian Shao*", "Zhengzheng Xu", "Peiyang Wang", "Like Liu$", "Yule Wang", "Jieqi Shi", "Jing Huo"]
year = 2026
pubType = "Conference"
conference = "Findings of the IEEE/CVF Conference on Computer Vision and Pattern Recognition 2026 (CVPR 2026 Findings)"
url = "https://smartdianlab.github.io/projects-FineCogNav/"
code = "https://github.com/SmartDianLab/FineCogNav"
dataset = "https://huggingface.co/datasets/Lozumi/AerialVLN-Fine"
abstract = "UAV vision-language navigation (VLN) requires an agent to navigate complex 3D environments from an egocentric perspective while following ambiguous multi-step instructions over long horizons. Existing zero-shot methods remain limited, as they often rely on large base models, generic prompts, and loosely coordinated modules. In this work, we propose FineCog-Nav, a top-down framework inspired by human cognition that organizes navigation into fine-grained modules for language processing, perception, attention, memory, imagination, reasoning, planning, and decision-making. Each module is driven by a moderate-sized foundation model with role-specific prompts and structured input-output protocols, enabling effective collaboration and improved interpretability. To support fine-grained evaluation, we construct AerialVLN-Fine, a curated benchmark of 300 trajectories derived from AerialVLN, with sentence-level instruction-trajectory alignment and refined instructions containing explicit visual endpoints and landmark references. Experiments show that FineCog-Nav consistently outperforms zero-shot baselines in instruction adherence, long-horizon planning, and generalization to unseen environments. These results suggest the effectiveness of fine-grained cognitive modularization for zero-shot aerial navigation."
keywords = ["UAV Navigation", "Vision-Language Navigation", "Zero-shot Learning", "Cognitive AI"]
researcharea = "Vision-Language Navigation"

[[publication]]
id = "shao2025largemodel"
selected = true
title = "Intelligent UAVs Empowered by Large Models: Progress, Applications and Perspectives"
preview = "/publications/poster_4.jpg"
aspectRatio = "3/4"
authors = ["Dian Shao*", "Chu Tang", "Min Chang", "Like Liu$", "Yule Wang", "Hao Li", "Junqiang Bai"]
year = 2026
pubType = "Journal"
journal = "Acta Aeronautica et Astronautica Sinica"
note = "EI indexed"
doi = "10.7527/S1000-6893.2026.33148"
abstract = "Large Foundation Models (LFMs), represented by Large Language Models, Vision–Language Models, and Vision Foundation Models, are driving a new wave of intelligent evolution for Unmanned Aerial Vehicles (UAVs). Focusing on this trend, the key characteristics and general capabilities of relevant models are first summarized, followed by a categorization of the mainstream embodied architectures driven by them. A comparison is conducted regarding the adaptability and trade-offs of different architectures within the high-dynamic and strongly constrained scenarios of UAVs. Secondly, an analysis is provided on how various LFMs reshape the four core functional elements of UAVs, including perception, planning, control, and interaction, through mechanisms such as open-world understanding, task-level semantic planning, embodied reasoning control, and multi-modal interaction. Furthermore, focusing on high-level cognitive functions driven by LFMs, the mechanisms, implementation pathways, technical limitations, and evaluation paradigms of reasoning, memory, reflection, and imagination in coping with complex UAV scenarios are discussed. The empowerment patterns and frontier progress of LFMs in four typical decision-making tasks are then summarized, including vision-language navigation, active target search, semantic delivery, and swarm intelligent coordination. Finally, core challenges regarding safety risks and protection mechanisms, engineering implementation, and edge deployment are discussed, envisioning future directions in efficient foundation intelligence, the perception-to-cognition transition, and ubiquitous industrial collaboration."
description = "Survey paper on large foundation model applications in intelligent UAV systems."
keywords = ["UAV", "Large Language Models", "Unmanned Systems", "AI"]
researcharea = "Intelligent UAV"

[[publication]]
id = "liu2026uavdualcog"
selected = true
title = "Knowing the Self, Understanding the World: A Dual-Cognition Benchmark for UAV Spatio-temporal Reasoning with MLLMs"
authors = ["Like Liu$", "Haitao He", "Zhengzheng Xu", "Hongzhe Li", "Shuchang Zhang", "Dian Shao*"]
year = 2026
pubType = "Conference"
conference = "Submitted to ACM MM 2026 Dataset Track"
abstract = "Multimodal large language models have achieved strong performance across diverse vision-language tasks, yet their capabilities in UAV scenarios remain insufficiently explored. Recent UAV-oriented benchmarks have begun to evaluate MLLMs in aerial scenarios, but they typically focus on scene understanding or event recognition, rather than jointly assessing the dual-cognition capability required for UAV agents: reasoning about both the UAV’s own state and the external environment in multiview spatio-temporal contexts. To address this gap, we present UAV-DualCog, a benchmark for aerial multiview spatio-temporal reasoning built on this dual-cognition perspective. UAV-DualCog includes both image and video tasks to jointly evaluate self-state and environment-state reasoning. We also develop an automated pipeline that constructs data from scene-level semantic point clouds, yielding a scalable benchmark with diverse scenes, hundreds of landmarks, and thousands of QA samples. We further conduct extensive evaluations on UAV-DualCog using a broad set of lightweight MLLMs selected under UAV-oriented deployment constraints. The results show that current models struggle on UAV-DualCog and perform substantially worse than on existing general spatial intelligence benchmarks. Notably, self-state reasoning is consistently more challenging than environment-state reasoning, suggesting that current MLLMs remain limited in modeling the UAV’s own state in aerial embodied settings. We expect UAV-DualCog to serve as a valuable benchmark for evaluating and advancing more capable MLLM-based UAV agents."
description = "We introduce UAV-DualCog, a new benchmark for evaluating multimodal LLMs on aerial dual-cognition tasks (reasoning about both UAV self-state and environment state in multiview spatio-temporal contexts) and show that current lightweight MLLMs struggle significantly, especially with self-state understanding."
keywords = ["Multimodal large language models", "UAV reasoning benchmark", "aerial vision-language understanding", "spatio-temporal reasoning"]
researcharea = "UAV Reasoning Benchmark"

